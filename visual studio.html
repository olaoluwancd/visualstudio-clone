<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vs code clone</title>
    <link rel="stylesheet" href="visualstudio.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Top bar -->
    <div class="topbar">
        <div class="logo">
            VS Code
        </div>
        <div class="menu">
                   File Edit Selection View
        </div>
    </div>
    <!--Main Container-->
    <div class="container">

        <!--sidebar-->
        <div class="sidebar">
            <div class="icon active-icon">
                <i class="fa-regular fa-file"></i>
            </div>
            <div class="icon">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <div class="icon">
                <i class="fa-solid fa-code-branch"></i>
            </div>
           <div class="icon">
                <i class="fa-solid fa-play"></i>
            </div>
            <div class="icon settings">
                <i class="fa-solid fa-gear"></i>
            </div>
        </div>
        <!--Explorer-->
        <div class="explorer">
           <h3>EXPLORER</h3>
           <div class="files">
            <p>index.html</p>
            <p>style.css</p>
            <p>script.js</p>
           </div>
        </div>
        <!--EDITOR SECTION-->
        <div class="editor-section">
            <!--Tabs-->
            <div class="tabs">
                <div class="tab active-tab">
                    index.html
                </div>
                <div class="tab">
                    style.css
                </div>
            </div>
            <!-- EDITOR-->
             <div class="editor">

                <pre>
                    &lt;h1&gt;Hello World&lt;/h1&gt;
                    &lt;p&gt;This is my VS code clone&lt;/p&gt;
                </pre>
             </div>
        </div>

    </div>
    <!--Bottom status bar-->
    <div class="statusbar">
        HTML | CSS | Ln 1, col 1
    </div>
</body>
</html>
